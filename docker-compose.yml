version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: rota_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: apicleanarchrota
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
   
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - rota-network

  migrations:
    build:
      context: .
      dockerfile: Dockerfile.migrations
    container_name: rota_migrations
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rota-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rota_api
    depends_on:
      db:
        condition: service_healthy 
      migrations:
        condition: service_started
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      
      - ConnectionStrings__DefaultConnection=server=db;port=3306;database=apicleanarchrota;user=root;password=123456
    networks:
      - rota-network

volumes:
  mysql_data:

networks:
  rota-network:
    driver: bridge